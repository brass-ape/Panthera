name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-tests:
    name: Python tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Compile-check every module
        run: python -m py_compile *.py

      - name: Run tests
        run: pytest -q

  rust-gui-build:
    name: Rust GUI build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@v4

      # eframe/egui's Linux (X11 + Wayland) backend needs these dev
      # packages at build time; this is the standard set from egui's
      # own eframe_template CI recipe.
      - name: Install native GUI build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gui/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gui/Cargo.lock') }}

      - name: Build (release)
        run: cargo build --release --locked
