<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Local AI Assistant</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="aero-bg" aria-hidden="true">
    <span class="orb orb-aqua"></span>
    <span class="orb orb-purple"></span>
    <span class="orb orb-coral"></span>
  </div>

  <div class="app-shell">
    <header class="glass topbar">
      <div class="brand">
        <span class="brand-orb"></span>
        <h1>Local AI Assistant</h1>
      </div>
      <div class="status-pills">
        <span class="pill"><span class="dot dot-live"></span>{{ backend }} &middot; {{ model }}</span>
        <span class="pill">web search: {{ web_search_backend }}</span>
        <button id="settings-button" class="icon-button" type="button" aria-label="Settings" aria-haspopup="dialog">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.6"/>
            <path d="M19.4 13.5a7.5 7.5 0 0 0 .1-3l1.9-1.5-2-3.4-2.3.6a7.6 7.6 0 0 0-2.6-1.5L14 2h-4l-.5 2.7a7.6 7.6 0 0 0-2.6 1.5l-2.3-.6-2 3.4L4.5 10.5a7.5 7.5 0 0 0 0 3l-1.9 1.5 2 3.4 2.3-.6a7.6 7.6 0 0 0 2.6 1.5L10 22h4l.5-2.7a7.6 7.6 0 0 0 2.6-1.5l2.3.6 2-3.4-1.9-1.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="glass chat-panel">
      <div id="messages" class="messages">
        <div class="bubble bubble-assistant">
          <div class="bubble-glare"></div>
          <p>Hi! Ask me anything -- I can remember things across conversations and, if enabled, search the web.</p>
        </div>
      </div>

      <div id="typing" class="typing-indicator hidden">
        <span></span><span></span><span></span>
      </div>
    </main>

    <form id="composer" class="glass composer" autocomplete="off">
      <input
        id="message-input"
        type="text"
        placeholder="Type a message..."
        aria-label="Message"
        required
      >
      <button type="submit" class="send-button" aria-label="Send">
        <span class="send-glare"></span>
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
          <path d="M3 11.5L21 3l-6 18-4.5-7.5L3 11.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
    </form>
  </div>

  <div id="settings-overlay" class="settings-overlay hidden" role="presentation">
    <div id="settings-dialog" class="glass settings-dialog" role="dialog" aria-modal="true" aria-labelledby="settings-title">
      <div class="settings-header">
        <h2 id="settings-title">Settings</h2>
        <button id="settings-close" class="icon-button" type="button" aria-label="Close settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <p class="settings-hint">
        Changes are saved to <code>config.json</code> and take effect immediately --
        overridden fields are marked <span class="override-dot"></span>.
      </p>
      <form id="settings-form" class="settings-form"></form>
      <div id="settings-error" class="settings-error hidden"></div>
      <div class="settings-actions">
        <button id="settings-save" class="settings-save-button" type="submit" form="settings-form">Save</button>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
